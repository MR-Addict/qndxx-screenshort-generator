 <script>
  // create footer
    const footer = document.createElement("footer");
    footer.innerHTML = `<footer">&copy; Copyright ${new Date().getFullYear()} MR-Addict</footer>`;
    document.body.appendChild(footer);
    // set image error image
    function img_error(element) {
      element.src = "404.png";
      element
        .closest(".img-element")
        .querySelectorAll("button")
        .forEach((but) => {
          but.disabled = true;
        });
    }
    // copy link
    function button_copy(element) {
      const link = element.closest(".img-element").querySelector("input").value;
      navigator.clipboard.writeText(link);
      Fnon.Alert.Dark(link, "复制成功", "OK", () => {});
    }
    // download image
    function button_download(element) {
      const title = element.closest(".img-element").querySelector("h1").innerText + ".jpg";
      const link = element.closest(".img-element").querySelector("input").value;
      const a_tag = document.createElement("a");
      a_tag.href = link;
      a_tag.download = title;
      a_tag.click();
      a_tag.remove();
    }
 </script>
